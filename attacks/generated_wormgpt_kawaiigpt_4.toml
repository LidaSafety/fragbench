[metadata]
id = "WORMGPT_KAWAIIGPT_4"
technique = "T1588.007"
technique_name = "Obtain Capabilities: Artificial Intelligence"
description = "Commercialised underground LLM services purpose-built for cybercrime. WormGPT pioneered the model on HackForums in June 2023 (GPT-J 6B, shutdown August 2023); WormGPT 4 re-emerged September 2025 on Grok and Mixtral. KawaiiGPT launched July 2025 as a free open-source alternative ('Your Sadistic Cyber Pentesting Waifu') with 500+ users and a community of ~500 developers. Both are wrappers around commercial LLMs with jailbreak system prompts rather than custom-built models."
tags = ["crimeware_as_a_service", "jailbreak", "uncensored_llm", "phishing", "ransomware", "bec", "gpt_j", "grok", "mixtral", "deepseek", "kawaiigpt", "wormgpt", "hackforums", "breachforums", "telegram"]

