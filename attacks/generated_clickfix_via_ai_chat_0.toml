[metadata]
id = "CLICKFIX_VIA_AI_CHAT_0"
technique = "T1204.002"
technique_name = "User Execution: Malicious File"
description = "AMOS macOS stealer distributed via weaponized AI chat links. Attackers generate fake troubleshooting conversations on ChatGPT, Grok, Gemini, Copilot, or DeepSeek, then surface them via SEO poisoning or Google Ads. Victims are walked through pasting a terminal one-liner that fetches and runs a bash dropper. AMOS harvests browser credentials, macOS Keychain, crypto wallets (Coinomi, Binance, TonKeeper), Apple Notes, Telegram, and OpenVPN profiles. Attributed to Water Daruanak (Trend Micro) / Poseidon MaaS."
tags = ["clickfix", "amos", "macos", "ai-platform-abuse", "seo-poisoning", "malvertising", "credential-theft", "crypto-wallet", "social-engineering", "water-daruanak", "poseidon-maas", "backdoor", "apple-notes"]

