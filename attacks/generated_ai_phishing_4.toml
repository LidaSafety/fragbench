[metadata]
id = "AI_PHISHING_4"
technique = "T1566"
technique_name = "Phishing"
description = "AI-Driven Phishing Campaign — Optimized Click-Through Rate (Jul 2024–Jun 2025). Models the iterative A/B optimization loop: research internal style → draft variant → optimize via feedback → mass-personalize at scale. AI-optimized phishing achieved 54% click-through vs 12% human-crafted — 4.5× improvement."
tags = ["ai", "phishing", "automation", "spearphishing", "bec", "a_b_optimization", "mass_personalization"]

