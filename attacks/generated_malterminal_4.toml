[metadata]
id = "MALTERMINAL_4"
technique = "T1588.007"
technique_name = "Obtain Capabilities: Artificial Intelligence"
description = "Earliest known LLM-enabled malware, pre-dating the 2025 wave by over a year. Python binary compiled to EXE via Python2EXE that queries GPT-4 at runtime to generate ransomware or reverse shell code on demand. No static malicious payload exists in the binary — all malicious logic is synthesised by the LLM during execution. Discovered by SentinelLABS via a year-long VirusTotal retrohunt and presented at LABScon 2025."
tags = ["gpt4", "openai", "python", "ransomware", "reverse_shell", "runtime_codegen", "poc", "labscon2025", "earliest_llm_malware"]

