[metadata]
id = "SCOPE_CREEP_39"
technique = "T1588.001"
technique_name = "Obtain Capabilities: Malware"
description = "Russian-speaking actor used ChatGPT across multiple sessions to iteratively write and debug Windows malware. Payload trojanized as gaming app, distributed via GitHub, C2 via Telegram. Kill chain: reverse shell → AV evasion → direct NT API syscall bypass."
tags = ["malware_generation", "scope_creep", "iterative_refinement", "ai_misuse", "windows", "telegram_c2"]

