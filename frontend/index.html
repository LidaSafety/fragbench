<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FragBench Runtime Viewer</title>
  <link rel="stylesheet" href="./assets/css/base.css">
  <link rel="stylesheet" href="./assets/css/components.css">
</head>
<body>
  <nav class="topbar">
    <div class="logo">FRAGBENCH</div>
    <div class="controls">
      <select id="run-selector"></select>
      <button id="refresh-runs-btn">Refresh</button>
      <button id="load-latest-btn">Load Latest</button>
      <button id="upload-mode-btn">Upload</button>
    </div>
  </nav>

  <section id="upload-panel" class="upload-panel hidden">
    <h3>Manual Upload Fallback</h3>
    <p>Upload seed JSON files, attack TOML-exported JSON data, and a session JSONL parsed into event objects.</p>
    <textarea id="upload-seeds" placeholder="Paste JSON array of seed objects"></textarea>
    <textarea id="upload-attacks" placeholder="Paste JSON array of attack objects"></textarea>
    <textarea id="upload-events" placeholder="Paste JSON array of session events"></textarea>
    <button id="upload-submit-btn">Normalize Uploaded Artifacts</button>
  </section>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-group open">
        <div class="sidebar-header" data-section="sec-fv">
          <span class="chevron">▾</span> FRAGMENT VARIATIONS
        </div>
        <div class="sidebar-body" id="sec-fv">
          <button class="sidebar-item active" data-view="campaigns">
            <span class="item-dot"></span> Campaigns
          </button>
          <button class="sidebar-item" data-view="fragments">
            <span class="item-dot"></span> Fragments
          </button>
          <div id="sidebar-campaigns-list"></div>
        </div>
      </div>

      <div class="sidebar-group open">
        <div class="sidebar-header" data-section="sec-traces">
          <span class="chevron">▾</span> MCP FRAGMENT TRACES
        </div>
        <div class="sidebar-body" id="sec-traces">
          <button class="sidebar-item" data-view="traces">
            <span class="item-dot"></span> All Traces
          </button>
          <div id="sidebar-traces-list"></div>
        </div>
      </div>

      <div class="sidebar-group open">
        <div class="sidebar-header" data-section="sec-gnn">
          <span class="chevron">▾</span> GNN PIPELINE
        </div>
        <div class="sidebar-body" id="sec-gnn">
          <button class="sidebar-item" data-view="gnn">
            <span class="item-dot"></span> Graph Classification
          </button>
          <button class="sidebar-item" data-view="demo">
            <span class="item-dot"></span> Interactive Demo
          </button>
        </div>
      </div>

      <div class="sidebar-group open">
        <div class="sidebar-header" data-section="sec-mitre">
          <span class="chevron">▾</span> MITRE ATTACK
        </div>
        <div class="sidebar-body" id="sec-mitre">
          <button class="sidebar-item" data-view="mitre">
            <span class="item-dot"></span> Coverage Matrix
          </button>
        </div>
      </div>

      <div class="sidebar-meta" id="run-summary"></div>
    </aside>

    <main class="content">
      <section id="view-campaigns" class="view active"></section>
      <section id="view-fragments" class="view"></section>
      <section id="view-traces" class="view"></section>
      <section id="view-gnn" class="view"></section>
      <section id="view-mitre" class="view"></section>
      <section id="view-demo" class="view"></section>
    </main>
  </div>

  <script type="module" src="./assets/js/main.js"></script>
</body>
</html>
