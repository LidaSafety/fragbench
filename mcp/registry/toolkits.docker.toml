# Docker-internal toolkit endpoints.
# Service names resolve via Docker DNS on the mcp-internal network.

[[toolkit]]
id = "filesystem_toolkit"
description = "Filesystem discovery and collection tools."
transport = "sse"
endpoint = "http://filesystem-server:8001/mcp"
tags = ["filesystem", "collection", "recon"]
attack_tags = []
execution_modes = ["simulated", "bounded_real"]
tool_prefix = "filesystem"

